name: scanpay
description: Aplikasi pemindai struk & otomatis hitung pengeluaran (Full Version)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 📷 Kamera & galeri
  image_picker: ^1.0.7

  # 🔍 OCR
  google_mlkit_text_recognition: ^0.11.0

  # 💾 Database & Storage
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # 📅 Format tanggal
  intl: ^0.19.0

  # 📊 Grafik
  fl_chart: ^0.68.0

  # 📄 PDF & Printing (Fitur Baru)
  pdf: ^3.10.8
  printing: ^5.11.0
  shared_preferences: ^2.5.5

  # 🔔 Notifikasi lokal
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true